services:
  redpanda:
    image: redpandadata/redpanda:v24.1.13
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-private_vpn}
      POSTGRES_USER: ${POSTGRES_USER:-private_vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-private_vpn}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/compose/init:/docker-entrypoint-initdb.d

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda
      - postgres
    ports:
      - "8080:8080"

  payment-ingest:
    build:
      context: .
      dockerfile: apps/payment-ingest/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda
    ports:
      - "8081:8081"

  subscription-service:
    build:
      context: .
      dockerfile: apps/subscription-service/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda
      - postgres
    ports:
      - "8082:8082"

  expiry-worker:
    build:
      context: .
      dockerfile: apps/expiry-worker/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda
      - postgres
    ports:
      - "8083:8083"

  push-publisher:
    build:
      context: .
      dockerfile: apps/push-publisher/Dockerfile
    env_file: .env.example
    depends_on:
      - redpanda
    ports:
      - "8084:8084"

volumes:
  postgres-data:
