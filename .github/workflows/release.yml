name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
          - service: payment-ingest
          - service: subscription-service
          - service: expiry-worker
          - service: push-publisher
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/private-vpn-project-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.value }}/private-vpn-project-${{ matrix.service }}:latest

  macos-admin:
    runs-on: macos-latest
    needs: docker-images
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app bundle
        run: ./scripts/package_admin_macos.sh

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PrivateVPNAdmin.app.zip
          generate_release_notes: true
